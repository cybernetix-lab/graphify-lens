name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: test -z "$(gofmt -s -l . 2>&1 | grep -v vendor)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: run tests
        run: go test -v -race -count=1 ./...

  build:
    needs: [lint, test]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64]
        include:
          - os: ubuntu-latest
            arch: arm64
            goarch: arm64
          - os: macos-latest
            arch: arm64
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        env:
          GOARCH: ${{ matrix.goarch || matrix.arch }}
        run: go build -o graphify-lens ./cmd/graphify-lens/
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphify-lens-${{ matrix.os }}-${{ matrix.arch }}
          path: graphify-lens*
