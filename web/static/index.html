<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphify Lens - 知识库管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header h1 { font-size: 18px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
.header .status { display: flex; gap: 16px; align-items: center; font-size: 13px; }
.header .status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.header .status .dot.green { background: #3fb950; }
.header .status .dot.red { background: #f85149; }
.header .status .dot.yellow { background: #d29922; }
.header .wd-selector { display: flex; align-items: center; gap: 8px; }
.header .wd-selector label { font-size: 12px; color: #8b949e; white-space: nowrap; }
.header .wd-selector select { padding: 4px 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 13px; min-width: 200px; }
.header .wd-selector select:focus { outline: none; border-color: #58a6ff; }
.tabs { display: flex; gap: 0; background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; }
.tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #e1e4e8; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.content { padding: 24px; }
.panel { display: none; }
.panel.active { display: block; }

.search-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.search-bar input { flex: 1; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 14px; }
.search-bar input:focus { outline: none; border-color: #58a6ff; }
.search-bar select { padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 14px; }
.search-bar .btn { padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 14px; background: #21262d; color: #e1e4e8; }
.search-bar .btn:hover { background: #30363d; }
.search-info { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
.search-info .highlight { color: #58a6ff; font-weight: 600; }

#graph-container { width: 100%; height: calc(100vh - 220px); border: 1px solid #30363d; border-radius: 8px; background: #0d1117; overflow: hidden; position: relative; }
#graph-container svg { width: 100%; height: 100%; }
.node circle { stroke-width: 2px; cursor: pointer; }
.node text { font-size: 11px; fill: #c9d1d9; pointer-events: none; }
.link { stroke: #30363d; stroke-opacity: 0.6; }
.link-label { font-size: 9px; fill: #8b949e; }
.tooltip { position: absolute; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-size: 12px; pointer-events: none; max-width: 280px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.tooltip .tt-title { font-weight: 600; color: #58a6ff; margin-bottom: 4px; }
.tooltip .tt-row { display: flex; justify-content: space-between; margin: 2px 0; }
.tooltip .tt-label { color: #8b949e; }
.tooltip .tt-value { color: #e1e4e8; }

.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.card h3 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.card .big-number { font-size: 48px; font-weight: 700; color: #58a6ff; }
.card .subtitle { font-size: 13px; color: #8b949e; margin-top: 4px; }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.metric-item { background: #0d1117; border-radius: 6px; padding: 10px; }
.metric-item .metric-label { font-size: 11px; color: #8b949e; }
.metric-item .metric-value { font-size: 20px; font-weight: 600; color: #e1e4e8; }
.metric-item .metric-sub { font-size: 11px; color: #8b949e; margin-top: 2px; }

.chart-container { width: 100%; height: 300px; position: relative; }
.chart-container.large { height: 400px; }

.settings { max-width: 700px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 14px; }
.form-group input:focus { outline: none; border-color: #58a6ff; }
.btn { padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.btn-primary { background: #238636; color: #fff; border-color: #238636; }
.btn-primary:hover { background: #2ea043; }
.btn-secondary { background: #21262d; color: #e1e4e8; }
.btn-secondary:hover { background: #30363d; }
.btn-danger { background: #da3633; color: #fff; border-color: #da3633; }
.btn-danger:hover { background: #f85149; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; margin-top: 16px; }

.legend { display: flex; gap: 16px; padding: 8px 0; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }

.loading { display: flex; align-items: center; justify-content: center; height: 200px; }
.spinner { width: 32px; height: 32px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.pagination { display: flex; gap: 4px; align-items: center; margin-top: 8px; }
.pagination .btn { font-size: 12px; padding: 4px 10px; }
.pagination .page-info { font-size: 12px; color: #8b949e; margin: 0 8px; }

.wd-list { margin-bottom: 20px; }
.wd-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; }
.wd-item.current { border-color: #58a6ff; background: #0d1a2d; }
.wd-item .wd-path { font-size: 14px; color: #e1e4e8; font-family: monospace; }
.wd-item .wd-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1f6feb; color: #fff; margin-left: 8px; }
.wd-item .wd-actions { display: flex; gap: 6px; }
.wd-add { display: flex; gap: 8px; margin-bottom: 16px; }
.wd-add input { flex: 1; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e1e4e8; font-size: 14px; }
.wd-add input:focus { outline: none; border-color: #58a6ff; }

.msg { font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 Graphify Lens - 知识库管理</h1>
  <div class="wd-selector">
    <label>📂 工作目录：</label>
    <select id="wd-select" onchange="switchWorkDir()">
      <option value="">-- 未选择 --</option>
    </select>
  </div>
  <div class="status">
    <span id="status-dot"><span class="dot green"></span> 运行中</span>
    <span id="status-score">质量分: --</span>
    <span id="status-commit">自动提交: --</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="graph">知识图谱</div>
  <div class="tab" data-tab="dashboard">质量仪表盘</div>
  <div class="tab" data-tab="history">历史趋势</div>
  <div class="tab" data-tab="settings">设置</div>
</div>
<div class="content">
  <div id="panel-graph" class="panel active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索节点（ID / 标签 / 源文件）..." onkeydown="if(event.key==='Enter')doSearch()">
      <select id="search-type">
        <option value="">全部类型</option>
        <option value="code">code</option>
        <option value="document">document</option>
        <option value="paper">paper</option>
        <option value="image">image</option>
      </select>
      <button class="btn" onclick="doSearch()">搜索</button>
      <button class="btn" onclick="clearSearch()">清除</button>
    </div>
    <div class="search-info" id="search-info"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#58a6ff"></span>code</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span>document</div>
      <div class="legend-item"><span class="legend-dot" style="background:#d29922"></span>paper</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f85149"></span>image</div>
      <div class="legend-item"><span class="legend-dot" style="background:#bc8cff"></span>other</div>
    </div>
    <div id="graph-container"></div>
    <div id="graph-tooltip" class="tooltip" style="display:none"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div id="panel-dashboard" class="panel">
    <div class="dashboard" id="dashboard-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
  <div id="panel-history" class="panel">
    <div class="card">
      <h3>质量分数趋势</h3>
      <div class="chart-container large"><canvas id="chart-trend"></canvas></div>
    </div>
    <div class="card" style="margin-top:16px">
      <h3>各维度趋势</h3>
      <div class="chart-container large"><canvas id="chart-dimensions"></canvas></div>
    </div>
  </div>
  <div id="panel-settings" class="panel">
    <div class="settings">
      <div class="card">
        <h3>📂 工作目录管理</h3>
        <div class="wd-add">
          <input type="text" id="wd-new-path" placeholder="输入工作目录路径，如 ./data/project-a" onkeydown="if(event.key==='Enter')addWorkDir()">
          <button class="btn btn-primary" onclick="addWorkDir()">添加</button>
        </div>
        <div class="wd-list" id="wd-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
        <div id="wd-msg" class="msg"></div>
      </div>
      <div class="card" style="margin-top:16px">
        <h3>⚙️ 全局配置</h3>
        <div class="form-group">
          <label>端口（需重启生效）</label>
          <input type="number" id="cfg-port" value="8080">
        </div>
        <div class="form-group">
          <label>自动提交间隔（如 30m, 1h）</label>
          <input type="text" id="cfg-interval" value="30m">
        </div>
        <div class="form-group">
          <label>提交信息模板</label>
          <input type="text" id="cfg-message" value="auto: graphify-lens knowledge base snapshot">
        </div>
        <div class="form-group">
          <label>质量历史目录</label>
          <input type="text" id="cfg-quality-history" placeholder="~/.graphify-lens/quality_history">
        </div>
        <div class="form-group">
          <label>数据目录</label>
          <input type="text" id="cfg-data-dir" placeholder="~/.graphify-lens">
        </div>
        <div class="form-group">
          <label>Author 名称</label>
          <input type="text" id="cfg-author-name" placeholder="Graphify Lens Bot">
        </div>
        <div class="form-group">
          <label>Author 邮箱</label>
          <input type="text" id="cfg-author-email" placeholder="graphify-lens-bot@teambuddy.local">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="cfg-auto-commit" checked>
            启用自动提交
          </label>
        </div>
        <div id="cfg-save-msg" class="msg"></div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
          <button class="btn btn-secondary" onclick="loadConfig()">重新加载</button>
          <button class="btn btn-secondary" onclick="runCycle()">立即执行周期</button>
          <button class="btn btn-secondary" onclick="refreshAll()">刷新状态</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API = '/api';
const COLORS = {
  code: '#58a6ff', document: '#3fb950', paper: '#d29922',
  image: '#f85149', unknown: '#484f58'
};

let currentQuery = '';
let currentType = '';
let currentOffset = 0;
let currentLimit = 500;
let graphSimulation = null;

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'graph') renderGraph();
    if (tab.dataset.tab === 'dashboard') renderDashboard();
    if (tab.dataset.tab === 'history') renderHistory();
    if (tab.dataset.tab === 'settings') loadConfig();
  });
});

async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

async function refreshAll() {
  try {
    const status = await fetchJSON(API + '/status');
    document.getElementById('status-score').textContent = '质量分: ' + (status.last_score != null ? status.last_score.toFixed(1) : '--');
    document.getElementById('status-commit').textContent = '自动提交: ' + (status.auto_commit_enabled ? '开启' : '关闭');
    updateWdSelector(status.work_dirs || [], status.current_work_dir || '');
  } catch(e) { console.error(e); }
}

function updateWdSelector(workDirs, currentWorkDir) {
  const sel = document.getElementById('wd-select');
  const oldVal = sel.value;
  sel.innerHTML = '<option value="">-- 未选择 --</option>';
  workDirs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    if (d === currentWorkDir) opt.selected = true;
    sel.appendChild(opt);
  });
  if (sel.value !== oldVal && currentWorkDir) {
    refreshPanels();
  }
}

function refreshPanels() {
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) {
    const t = activeTab.dataset.tab;
    if (t === 'graph') renderGraph();
    if (t === 'dashboard') renderDashboard();
    if (t === 'history') renderHistory();
  }
}

async function switchWorkDir() {
  const path = document.getElementById('wd-select').value;
  if (!path) return;
  try {
    await fetchJSON(API + '/config/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path })
    });
    refreshAll();
  } catch(e) {
    alert('切换失败: ' + e.message);
    refreshAll();
  }
}

async function runCycle() {
  try {
    const res = await fetch(API + '/cycle/run', { method: 'POST' });
    const data = await res.json();
    alert('周期执行完成！质量分: ' + (data.assessment ? data.assessment.total_score.toFixed(1) : 'N/A'));
    refreshAll();
  } catch(e) { alert('执行失败: ' + e.message); }
}

function doSearch() {
  currentQuery = document.getElementById('search-input').value.trim();
  currentType = document.getElementById('search-type').value;
  currentOffset = 0;
  renderGraph();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-type').value = '';
  currentQuery = '';
  currentType = '';
  currentOffset = 0;
  renderGraph();
}

function goPage(delta) {
  currentOffset = Math.max(0, currentOffset + delta * currentLimit);
  renderGraph();
}

async function renderGraph() {
  const container = document.getElementById('graph-container');
  const info = document.getElementById('search-info');
  const pagination = document.getElementById('pagination');

  try {
    let url = API + '/graph/query?limit=' + currentLimit + '&offset=' + currentOffset;
    if (currentQuery) url += '&q=' + encodeURIComponent(currentQuery);
    if (currentType) url += '&type=' + encodeURIComponent(currentType);

    const data = await fetchJSON(url);

    if (!data.nodes || data.nodes.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>未找到匹配的节点</p><p style="font-size:12px;margin-top:8px">尝试其他搜索关键词或确认工作目录中有 graphify-out 数据</p></div>';
      info.innerHTML = '';
      pagination.innerHTML = '';
      return;
    }

    const totalPages = Math.ceil(data.total_nodes / currentLimit);
    const currentPage = Math.floor(currentOffset / currentLimit) + 1;

    info.innerHTML = '找到 <span class="highlight">' + data.total_nodes.toLocaleString() + '</span> 个节点，' +
      '显示 <span class="highlight">' + (currentOffset + 1) + '-' + Math.min(currentOffset + data.nodes.length, data.total_nodes).toLocaleString() + '</span>' +
      (data.truncated ? ' <span style="color:#d29922">（还有更多）</span>' : '');

    pagination.innerHTML = '';
    if (totalPages > 1) {
      pagination.innerHTML += '<button class="btn" onclick="goPage(-1)" ' + (currentOffset === 0 ? 'disabled' : '') + '>上一页</button>';
      pagination.innerHTML += '<span class="page-info">第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
      pagination.innerHTML += '<button class="btn" onclick="goPage(1)" ' + (data.truncated ? '' : 'disabled') + '>下一页</button>';
    }

    const width = container.clientWidth;
    const height = container.clientHeight;

    container.innerHTML = '';
    const svg = d3.select('#graph-container').append('svg')
      .attr('viewBox', [0, 0, width, height]);

    const g = svg.append('g');

    const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
    svg.call(zoom);

    const nodes = data.nodes.map(n => ({ ...n, id: n.id }));
    const links = data.edges.map(e => ({ ...e, source: e.source, target: e.target }));

    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(80))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(25));

    const link = g.append('g').selectAll('line')
      .data(links).join('line')
      .attr('class', 'link')
      .attr('stroke-width', d => Math.max(1, d.confidence_score * 3));

    const linkLabel = g.append('g').selectAll('text')
      .data(links).join('text')
      .attr('class', 'link-label')
      .text(d => d.relation || '');

    const node = g.append('g').selectAll('g')
      .data(nodes).join('g')
      .attr('class', 'node')
      .call(d3.drag()
        .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    node.append('circle')
      .attr('r', d => Math.max(6, Math.min(16, 6 + (d.source_file ? 2 : 0))))
      .attr('fill', d => COLORS[d.file_type] || COLORS.unknown)
      .attr('stroke', d => d3.color(COLORS[d.file_type] || COLORS.unknown).darker(0.5));

    node.append('text')
      .attr('dy', d => -Math.max(8, Math.min(18, 8 + (d.source_file ? 2 : 0))))
      .attr('text-anchor', 'middle')
      .text(d => (d.label || d.id).length > 25 ? (d.label || d.id).substring(0, 22) + '...' : (d.label || d.id));

    const tooltip = document.getElementById('graph-tooltip');

    node.on('mouseover', (event, d) => {
      tooltip.style.display = 'block';
      tooltip.innerHTML = `
        <div class="tt-title">${d.label || d.id}</div>
        <div class="tt-row"><span class="tt-label">类型</span><span class="tt-value">${d.file_type || 'unknown'}</span></div>
        <div class="tt-row"><span class="tt-label">来源</span><span class="tt-value">${d.source_file || '未设置'}</span></div>
        <div class="tt-row"><span class="tt-label">作者</span><span class="tt-value">${d.author || '未设置'}</span></div>
        <div class="tt-row"><span class="tt-label">贡献者</span><span class="tt-value">${d.contributor || '未设置'}</span></div>
      `;
    }).on('mousemove', (event) => {
      tooltip.style.left = (event.offsetX + 15) + 'px';
      tooltip.style.top = (event.offsetY - 10) + 'px';
    }).on('mouseout', () => {
      tooltip.style.display = 'none';
    });

    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      linkLabel.attr('x', d => (d.source.x + d.target.x) / 2)
        .attr('y', d => (d.source.y + d.target.y) / 2);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    graphSimulation = simulation;
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载图谱失败: ' + e.message + '</p></div>';
    info.innerHTML = '';
    pagination.innerHTML = '';
  }
}

async function renderDashboard() {
  const container = document.getElementById('dashboard-content');
  try {
    const [quality, stats] = await Promise.all([
      fetchJSON(API + '/quality/current'),
      fetchJSON(API + '/stats')
    ]);

    const scoreColor = quality.total_score >= 80 ? '#3fb950' : quality.total_score >= 60 ? '#d29922' : '#f85149';

    container.innerHTML = `
      <div class="card" style="grid-column: 1/-1; text-align:center">
        <h3>知识质量总分</h3>

          <div class="metric-item">

let trendChart = null, dimChart = null;

async function renderHistory() {
  try {
    const history = await fetchJSON(API + '/quality/history');
    if (!history || history.length === 0) {
      document.getElementById('panel-history').innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>暂无历史质量数据</p><p style="font-size:12px;margin-top:8px">执行一次周期即可生成质量评估记录</p></div>';
      return;
    }

    history.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    const labels = history.map(h => new Date(h.timestamp).toLocaleDateString('zh-CN'));
    const scores = history.map(h => h.total_score);
    const coverage = history.map(h => h.coverage.score * 100);
    const accuracy = history.map(h => h.accuracy.score * 100);
    const freshness = history.map(h => h.freshness.score * 100);
    const governance = history.map(h => h.governance.score * 100);
    const reuse = history.map(h => h.reuse_growth.score * 100);

    if (trendChart) trendChart.destroy();
    const ctx1 = document.getElementById('chart-trend').getContext('2d');
    trendChart = new Chart(ctx1, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '质量总分',
          data: scores,
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#58a6ff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e' } } },
        scales: {
          x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
          y: { min: 0, max: 100, ticks: { color: '#8b949e', callback: v => v.toFixed(1) }, grid: { color: '#21262d' } }
        }
      }
    });

    if (dimChart) dimChart.destroy();
    const ctx2 = document.getElementById('chart-dimensions').getContext('2d');
    dimChart = new Chart(ctx2, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '覆盖度', data: coverage, borderColor: '#3fb950', tension: 0.3, pointRadius: 3 },
          { label: '准确度', data: accuracy, borderColor: '#58a6ff', tension: 0.3, pointRadius: 3 },
          { label: '新鲜度', data: freshness, borderColor: '#d29922', tension: 0.3, pointRadius: 3 },
          { label: '治理度', data: governance, borderColor: '#bc8cff', tension: 0.3, pointRadius: 3 },
          { label: '复用成长', data: reuse, borderColor: '#f85149', tension: 0.3, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e' } } },
        scales: {
          x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
          y: { min: 0, max: 100, ticks: { color: '#8b949e', callback: v => v + '%' }, grid: { color: '#21262d' } }
        }
      }
    });
  } catch(e) {
    console.error('History render error:', e);
  }
}

async function loadConfig() {
  try {
    const cfg = await fetchJSON(API + '/config');
    document.getElementById('cfg-port').value = cfg.port || 8080;
    document.getElementById('cfg-interval').value = cfg.commit_interval || '30m';
    document.getElementById('cfg-message').value = cfg.commit_message || '';
    document.getElementById('cfg-quality-history').value = cfg.quality_history || '';
    document.getElementById('cfg-data-dir').value = cfg.data_dir || '';
    document.getElementById('cfg-author-name').value = cfg.author_name || '';
    document.getElementById('cfg-author-email').value = cfg.author_email || '';
    document.getElementById('cfg-auto-commit').checked = cfg.git_auto_commit !== false;
    renderWdList(cfg.work_dirs || [], cfg.current_work_dir || '');
  } catch(e) {
    showMsg('cfg-save-msg', '加载失败: ' + e.message, '#f85149');
  }
}

function renderWdList(workDirs, currentWorkDir) {
  const container = document.getElementById('wd-list');
  if (workDirs.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:20px"><p style="font-size:13px">暂无工作目录，请添加</p></div>';
    return;
  }
  container.innerHTML = workDirs.map(d => `
    <div class="wd-item${d === currentWorkDir ? ' current' : ''}">
      <div>
        <span class="wd-path">${escapeHtml(d)}</span>
        ${d === currentWorkDir ? '<span class="wd-badge">当前</span>' : ''}
      </div>
      <div class="wd-actions">
        ${d !== currentWorkDir ? `<button class="btn btn-primary btn-sm" onclick="switchToWd('${escapeAttr(d)}')">切换</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="removeWorkDir('${escapeAttr(d)}')">删除</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

async function addWorkDir() {
  const input = document.getElementById('wd-new-path');
  const path = input.value.trim();
  if (!path) return;
  try {
    const res = await fetchJSON(API + '/config/workdirs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path })
    });
    input.value = '';
    renderWdList(res.work_dirs, res.current_work_dir);
    updateWdSelector(res.work_dirs, res.current_work_dir);
    showMsg('wd-msg', '已添加: ' + path, '#3fb950');
  } catch(e) {
    showMsg('wd-msg', '添加失败: ' + e.message, '#f85149');
  }
}

async function removeWorkDir(path) {
  if (!confirm('确定要删除工作目录 "' + path + '" 吗？')) return;
  try {
    const res = await fetchJSON(API + '/config/workdirs?path=' + encodeURIComponent(path), {
      method: 'DELETE'
    });
    renderWdList(res.work_dirs, res.current_work_dir);
    updateWdSelector(res.work_dirs, res.current_work_dir);
    showMsg('wd-msg', '已删除: ' + path, '#3fb950');
  } catch(e) {
    showMsg('wd-msg', '删除失败: ' + e.message, '#f85149');
  }
}

async function switchToWd(path) {
  try {
    await fetchJSON(API + '/config/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path })
    });
    refreshAll();
    showMsg('wd-msg', '已切换到: ' + path, '#3fb950');
  } catch(e) {
    showMsg('wd-msg', '切换失败: ' + e.message, '#f85149');
  }
}

async function saveConfig() {
  const body = {
    port: parseInt(document.getElementById('cfg-port').value) || 0,
    commit_interval: document.getElementById('cfg-interval').value,
    commit_message: document.getElementById('cfg-message').value,
    quality_history: document.getElementById('cfg-quality-history').value,
    data_dir: document.getElementById('cfg-data-dir').value,
    author_name: document.getElementById('cfg-author-name').value,
    author_email: document.getElementById('cfg-author-email').value,
    git_auto_commit: document.getElementById('cfg-auto-commit').checked
  };
  try {
    await fetchJSON(API + '/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    showMsg('cfg-save-msg', '配置已保存', '#3fb950');
    refreshAll();
  } catch(e) {
    showMsg('cfg-save-msg', '保存失败: ' + e.message, '#f85149');
  }
}

function showMsg(id, msg, color) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.style.color = color;
  el.textContent = msg;
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
